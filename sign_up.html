<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-UP</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="img_container">
            <caption>Photo by BrigitHeld on pexel.com</caption>
        </div>

        <div class="content_container">
            <div class="text_cont"><h2>Bright Library, <br><br>where the community meets the world through books.
                </h2>
                <br>
                <h2>Join us right now!</h2>

            </div> 
            <form action="#" method="post">
            <div class="signup-card">
                    <div class="input_cont">
                        <label for="">*First Name</label>
                        <input type="text" required>
                    </div>
                    <div class="input_cont">
                        <label>Last Name</label>
                        <input type="text">
                    </div>
                    <div class="input_cont">
                        <label>*Email</label>
                        <input type="email" placeholder="example@gmail.com" pattern="[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[a-z]{2,}$" required>
                    </div>
                    <div class="input_cont">
                        <label>*Phone Number</label>
                        <input type="text" pattern="\d{3,}" required>
                    </div>
                    <div class="input_cont">
                        <label>*Password</label>
                        <input type="password" required>
                    </div>
                    <div class="input_cont">
                        <label>*Confirm Password</label>
                        <input type="password" required>
                    </div>
            </div>
            <div class="buttons">
                <button type="submit">Create Account</button>
                <h4>Already have an account? <a href="#">Log in</a></h4>
            </div>
        </form>
        </div>
    </div>
</body>

</html>
